<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Garden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app" id="app">

    <!-- ── Module Bar ──────────────────────────────────────── -->
    <nav class="module-bar">
      <div class="site-logo" title="Knowledge Garden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>

      <div class="module-list">
        <button class="module-btn active" data-module="notes" title="Notes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          <span>Notes</span>
        </button>

        <button class="module-btn" data-module="skill-tree" title="Skill Tree">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="4" r="2"/>
            <circle cx="5" cy="20" r="2"/>
            <circle cx="19" cy="20" r="2"/>
            <line x1="12" y1="6" x2="12" y2="13"/>
            <line x1="12" y1="13" x2="5" y2="18"/>
            <line x1="12" y1="13" x2="19" y2="18"/>
          </svg>
          <span>Skill Tree</span>
        </button>
      </div>
    </nav>

    <!-- ── Side Panel ─────────────────────────────────────── -->
    <aside class="side-panel" id="side-panel">
      <div class="panel-header">
        <span class="panel-title" id="panel-title">Notes</span>
        <button class="icon-btn" id="collapse-btn" title="Collapse panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
      </div>
      <div class="note-tree" id="note-tree">
        <div class="tree-loading">
          <div class="spinner"></div>
          <span>Loading notes…</span>
        </div>
      </div>
      <div class="note-toc hidden" id="note-toc">
        <button class="toc-back-btn" id="toc-back-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          All Notes
        </button>
        <nav id="toc-nav"></nav>
      </div>
    </aside>

    <!-- ── Main Content ───────────────────────────────────── -->
    <main class="main-content" id="main-content">

      <!-- Notes View -->
      <div id="notes-view" class="view active">
        <div class="welcome-state" id="welcome-state">
          <div class="welcome-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
          </div>
          <h2>Select a note</h2>
          <p>Browse the tree on the left to open a note.</p>
        </div>

        <article class="note-content hidden" id="note-content">
          <header class="note-header">
            <nav class="note-breadcrumb" id="note-breadcrumb"></nav>
            <h1 class="note-title" id="note-title"></h1>
          </header>
          <div class="note-body markdown-body" id="note-body"></div>
        </article>
      </div>

      <!-- Skill Tree View -->
      <div id="skill-tree-view" class="view">
        <div id="skill-tree-container"></div>
        <div class="st-legend" id="st-legend"></div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
